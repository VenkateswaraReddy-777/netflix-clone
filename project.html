<title>Netflix Clone</title>

<style>
body { margin:0; font-family:Arial; background:#111; color:white; }

/* AUTH */
.auth-container { display:flex; height:100vh; justify-content:center; align-items:center; }
.auth-box { background:#000; padding:30px; width:300px; }
.auth-box input, .auth-box button { width:100%; padding:10px; margin:10px 0; }
.auth-box button { background:red; border:none; color:white; cursor:pointer; }

/* APP */
#app { display:none; }
header { display:flex; justify-content:space-between; padding:20px; position:fixed; width:100%; }
.logo { color:red; font-size:24px; }

.banner {
    height:400px;
    background:url('https://images.unsplash.com/photo-1606813907291-d86efa9b94db') center/cover;
    padding:50px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.row { margin-left:20px; }
.row-posters { display:flex; overflow-x:scroll; }
.poster { width:150px; margin:10px; cursor:pointer; transition:0.3s; }
.poster:hover { transform:scale(1.1); }

/* MODAL */
.modal {
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
}
.modal iframe { width:80%; height:80%; }
.close { position:absolute; top:20px; right:30px; font-size:30px; cursor:pointer; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="auth" class="auth-container">
<div class="auth-box">
<h2 id="title">Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button type="button" onclick="auth()">Login</button>
<p onclick="toggle()" style="cursor:pointer">Switch to Signup</p>
</div>
</div>

<!-- APP -->
<div id="app">

<header>
<div class="logo">NETFLIX</div>
<div onclick="logout()" style="cursor:pointer">Logout</div>
</header>

<div class="banner">
<h1>Netflix Clone</h1>
<button onclick="playTrailer()">▶ Play</button>
</div>

<div class="row"><h2>Trending</h2><div id="r1" class="row-posters"></div></div>
<div class="row"><h2>Action</h2><div id="r2" class="row-posters"></div></div>
<div class="row"><h2>Comedy</h2><div id="r3" class="row-posters"></div></div>
<div class="row"><h2>Horror</h2><div id="r4" class="row-posters"></div></div>

<div class="modal" id="modal">
<span class="close" onclick="closeModal()">✖</span>
<iframe id="trailer"></iframe>

const emailEl = document.getElementById("email");
const passwordEl = document.getElementById("password");
const authDiv = document.getElementById("auth");
const app = document.getElementById("app");

let isLogin = true;

/* TOGGLE */
function toggle(){
    isLogin = !isLogin;
    document.getElementById("title").innerText = isLogin ? "Login" : "Signup";
}

/* AUTH */
function auth(){
    let email = emailEl.value.trim();
    let password = passwordEl.value.trim();

    if(!email || !password){
        alert("Enter email & password");
        return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || [];

    if(isLogin){
        let user = users.find(u => u.email === email && u.password === password);
        if(user){
            localStorage.setItem("user", email);
            load();
        } else {
            alert("Invalid email or password");
        }
    } else {
        let exists = users.find(u => u.email === email);
        if(exists){
            alert("User already exists");
            return;
        }
        users.push({ email, password });
        localStorage.setItem("users", JSON.stringify(users));
        alert("Signup successful! Now login.");
        toggle();
    }
}

/* LOAD */
function load(){
    authDiv.style.display = "none";
    app.style.display = "block";
}

if(localStorage.getItem("user")) load();

/* LOGOUT */
function logout(){
    localStorage.removeItem("user");
    location.reload();
}

function loadMovies(row,data){
let r=document.getElementById(row);
data.forEach(m=>{
let img=document.createElement("img");
img.src=m.i;
img.className="poster";
img.title=m.t;
img.onclick=()=>openModal(m.tr);
r.appendChild(img);
});
}

Object.keys(data).forEach(k=>loadMovies(k,data[k]));

/* MODAL */

modal.style.display="flex";

}

modal.style.display="none";

}
